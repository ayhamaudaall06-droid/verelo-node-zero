<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Pending Orders</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --verelo-accent: #c45c3e;
      --verelo-accent-light: rgba(196, 92, 62, 0.15);
      --verelo-bg: #f5f3ef;
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --track-bg: rgba(0, 0, 0, 0.06);
      --text-muted: #6b6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--verelo-bg);
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .status-toast {
      padding: 10px 20px;
      background: #2d8a4e;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .order-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--glass-shadow);
    }

    .order-card h3 { font-size: 16px; margin-bottom: 16px; color: #1a1a1a; }
    .order-item { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
    .order-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; color: var(--verelo-accent); margin: 16px 0 24px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.06); }

    /* Slider Component Styles (Class-based for multiple instances) */
    .slide-track { height: 64px; background: var(--track-bg); border-radius: 32px; border: 1px solid var(--glass-border); position: relative; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.04); }
    .slide-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--text-muted); pointer-events: none; transition: opacity 0.3s ease; user-select: none; }
    .slide-hint.confirmed { color: var(--verelo-accent); font-weight: 700; }
    .slide-thumb { width: 56px; height: 56px; background: linear-gradient(135deg, var(--verelo-accent) 0%, #a84d32 100%); border-radius: 28px; position: absolute; top: 4px; left: 4px; cursor: grab; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(196, 92, 62, 0.35); transition: transform 0.1s ease; touch-action: none; z-index: 10; }
    .slide-thumb:active { cursor: grabbing; transform: scale(0.96); }
    .slide-thumb::after { content: '→'; color: white; font-size: 20px; font-weight: 700; }
    .slide-thumb.confirmed { background: linear-gradient(135deg, #2d8a4e 0%, #1e6b38 100%); box-shadow: 0 4px 12px rgba(45, 138, 78, 0.35); }
    .slide-thumb.confirmed::after { content: '✓'; }
    .slide-progress { position: absolute; inset: 0; background: linear-gradient(90deg, var(--verelo-accent-light) 0%, transparent 100%); border-radius: 32px; transform-origin: left; transform: scaleX(0); pointer-events: none; opacity: 0.6; }
    
    .confirmed-state { display: none; text-align: center; padding: 10px 0; color: #2d8a4e; font-weight: 600; font-size: 15px; }
  </style>
</head>
<body>

  <div class="admin-header">
    <h2>Pending WhatsApp Orders</h2>
    <div id="status-toast" class="status-toast">Order confirmed & customer notified</div>
  </div>

  <div class="orders-grid" id="orders-container">
    </div>

  <script>
    // Mock Data (Replace with API fetch in production)
    const pendingOrders = [
      { id: 'ORD-ABC123', items: [{name: 'Ethiopian Yirgacheffe', price: '24.00'}], total: '24.00' },
      { id: 'ORD-XYZ789', items: [{name: 'Verelo Bundle', price: '49.99'}], total: '49.99' }
    ];

    function showStatus(msg) {
      const toast = document.getElementById('status-toast');
      toast.textContent = msg;
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, 3000);
    }

    async function confirmOrder(orderId, trackElement) {
      try {
        // --- YOUR ACTUAL BACKEND CALL GOES HERE ---
        // const res = await fetch(`/api/order/${orderId}/confirm`, { method: 'POST' });
        // const data = await res.json();
        
        // Mocking successful response for now:
        const data = { ok: true }; 
        
        if (data.ok) {
          showStatus(`Order #${orderId} confirmed & customer notified`);
          
          // UI Updates after successful API call
          setTimeout(() => {
            trackElement.style.display = 'none';
            const confirmedMsg = trackElement.nextElementSibling;
            confirmedMsg.style.display = 'block';
          }, 400);
        }
      } catch (err) {
        console.error('Failed to confirm order', err);
        showStatus('Error confirming order');
      }
    }

    function renderOrderCard(order) {
      const itemsHtml = order.items.map(i => `<div class="order-item"><span>${i.name}</span><span>USD ${i.price}</span></div>`).join('');
      
      return `
        <div class="order-card" id="card-${order.id}">
          <h3>Order #${order.id}</h3>
          ${itemsHtml}
          <div class="order-total"><span>Total</span><span>USD ${order.total}</span></div>
          
          <div class="slide-track" data-order="${order.id}">
            <div class="slide-progress"></div>
            <div class="slide-hint">Slide to confirm via WhatsApp</div>
            <div class="slide-thumb"></div>
          </div>
          <div class="confirmed-state">✓ Confirmed</div>
        </div>
      `;
    }

    // Render the UI
    document.getElementById('orders-container').innerHTML = pendingOrders.map(renderOrderCard).join('');

    // Initialize all sliders
    document.querySelectorAll('.slide-track').forEach(track => {
      const thumb = track.querySelector('.slide-thumb');
      const progress = track.querySelector('.slide-progress');
      const hint = track.querySelector('.slide-hint');
      const orderId = track.dataset.order;
      
      let isDragging = false, startX = 0, currentX = 4;
      const thumbWidth = 56;
      let isConfirmed = false;

      function updatePosition(x, maxDrag) {
        currentX = Math.max(4, Math.min(x, maxDrag));
        const pct = (currentX - 4) / maxDrag;
        thumb.style.left = currentX + 'px';
        progress.style.transform = `scaleX(${pct})`;
        hint.style.opacity = Math.max(0, 1 - pct * 2.5);
      }

      function handleDragStart(clientX) {
        if (isConfirmed) return;
        isDragging = true;
        startX = clientX - currentX;
        thumb.style.transition = '';
        progress.style.transition = '';
      }

      function handleDragMove(clientX) {
        if (!isDragging || isConfirmed) return;
        const maxDrag = track.offsetWidth - thumbWidth - 8;
        updatePosition(clientX - startX, maxDrag);
      }

      function handleDragEnd() {
        if (!isDragging) return;
        isDragging = false;
        const maxDrag = track.offsetWidth - thumbWidth - 8;
        
        if (currentX >= maxDrag * 0.85) {
          // Confirm Triggered
          isConfirmed = true;
          thumb.classList.add('confirmed');
          hint.textContent = 'Confirming...';
          hint.classList.add('confirmed');
          hint.style.opacity = 1;
          thumb.style.transition = 'left 0.3s cubic-bezier(0.16,1,0.3,1)';
          updatePosition(maxDrag + 4, maxDrag);
          
          confirmOrder(orderId, track);
        } else {
          // Snap back
          thumb.style.transition = 'left 0.3s cubic-bezier(0.16,1,0.3,1)';
          progress.style.transition = 'transform 0.3s ease';
          updatePosition(4, maxDrag);
        }
      }

      // Mouse Events
      thumb.addEventListener('mousedown', e => handleDragStart(e.clientX));
      document.addEventListener('mousemove', e => handleDragMove(e.clientX));
      document.addEventListener('mouseup', handleDragEnd);

      // Touch Events
      thumb.addEventListener('touchstart', e => handleDragStart(e.touches[0].clientX), { passive: false });
      document.addEventListener('touchmove', e => { if(isDragging) e.preventDefault(); handleDragMove(e.touches[0].clientX); }, { passive: false });
      document.addEventListener('touchend', handleDragEnd);
    });
  </script>
</body>
</html>
